trigger:
- main

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'

steps:
- task: UseDotNet@2
  displayName: 'Instalar .NET SDK 9'
  inputs:
    packageType: 'sdk'
    version: '9.x'

- script: dotnet restore
  displayName: 'Restaurar dependencias'

- script: dotnet build --configuration $(buildConfiguration) --no-restore
  displayName: 'Compilar aplicación'

- script: dotnet publish --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/publish
  displayName: 'Publicar aplicación'

- task: ArchiveFiles@2
  displayName: 'Comprimir aplicación publicada'
  inputs:
    rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/publish'
    includeRootFolder: false
    archiveType: 'zip'
    archiveFile: '$(Build.ArtifactStagingDirectory)/HelpDeskLite.zip'
    replaceExistingArchive: true

- task: PublishBuildArtifacts@1
  displayName: 'Publicar artefacto'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)/HelpDeskLite.zip'
    ArtifactName: 'drop'
    publishLocation: 'Container'